<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Blog Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Create a new Blog Post here</h1>
    <div class="form-container">
        <form method="POST" action="/add">
            <label for="title">Title of your Blog Post:</label><br>
            <input type="text" id="title" name="title"><br><br>
            <label for="author">Your name:</label><br>
            <input type="text" id="author" name="author"><br><br>
            <label for="content">Write your Blog Post here:</label><br>
            <textarea id="content" name="content" rows="10"></textarea><br><br>
            <input type="submit" value="Post it!">
        </form>
    </div>
</body>
</html>
